
<!DOCTYPE html>
<!-- Step 1: Initial UI setup -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supervised Transcript Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 600px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      resize: none;
      font-size: 14px;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #2563eb;
    }

    .output {
      margin-top: 20px;
      padding: 10px;
      background: #020617;
      border-radius: 8px;
      min-height: 80px;
      white-space: pre-wrap;
      max-height: 300px;        
      overflow-y: auto;         
      white-space: pre-wrap;
   
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Supervisor Transcript Analyzer</h1>

    <textarea id="transcript" placeholder="Paste transcript here..."></textarea>

    <button onclick="runAnalysis()">Analyze Transcript</button>

    <div class="output" id="output">Results will appear here...</div>
  </div>

  <script>
async function runAnalysis() {
  const transcript = document.getElementById("transcript").value;
  const outputDiv = document.getElementById("output");

  if (!transcript.trim()) {
    outputDiv.textContent = "Please paste a transcript first.";
    return;
  }

  outputDiv.textContent = "Analyzing...";

  try {
    const response = await fetch("http://localhost:11434/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama3.2",
        prompt: `
You are an expert evaluator using the DT Fellow Performance Rubric.

Analyze the supervisor transcript and return ONLY a valid JSON object.

MANDATORY FIELD RULES:
- confidence → ["low","medium","high"]
- signal → ["positive","negative","neutral"]
- dimension → ["execution","systems_building","kpi_impact","change_management"]
- systemOrPersonal → ["system","personal"]

SCORING:
- 1–3 Need Attention
- 4–6 Productivity
- 7–10 Performance

CRITICAL:
6 = execution only
7 = independent problem identification

OUTPUT FORMAT:
{
  "score": {
    "value": 0,
    "label": "",
    "band": "",
    "justification": "",
    "confidence": ""
  },
  "evidence": [
    {
      "quote": "",
      "signal": "",
      "dimension": "",
      "interpretation": ""
    }
  ],
  "kpiMapping": [
    {
      "kpi": "",
      "evidence": "",
      "systemOrPersonal": ""
    }
  ],
  "gaps": [
    {
      "dimension": "",
      "detail": ""
    }
  ],
  "followUpQuestions": [
    {
      "question": "",
      "targetGap": "",
      "lookingFor": ""
    }
  ]
    "followUpQuestions": [
    {
      "question": "",
      "targetGap": "",
      "lookingFor": ""
    }
  ]
}

INSTRUCTIONS:
- Return ONLY JSON
- Fill ALL fields
- Use real quotes
- Never leave blank

Transcript:
${transcript}
`,
        stream: false
      })
    });

    const data = await response.json();

    try {
      const result = JSON.parse(data.response);
     outputDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
    } catch (e) {
      outputDiv.textContent = data.response;
    }

  } catch (error) {
    outputDiv.textContent = "Error connecting to Ollama.";
    console.error(error);
  }
}
</script>
